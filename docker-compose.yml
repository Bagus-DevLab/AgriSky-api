version: "3.9"

services:
  api:
    build: .
    container_name: fastapi-mqtt
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - mqtt

  db:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: iot_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mqtt:
    image: eclipse-mosquitto
    container_name: mqtt-broker
    ports:
      - "1883:1883"

volumes:
  pgdata:
